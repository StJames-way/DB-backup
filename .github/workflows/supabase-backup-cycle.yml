name: Supabase Encrypted Backup with Safety Net

on:
  repository_dispatch:
    types: [supabase_backup_trigger]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: supabase-backup
  cancel-in-progress: true

jobs:
  backup-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install PostgreSQL 17 Client and GPG
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg postgresql-common

          sudo install -d /usr/share/postgresql-common/pgdg

          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc

          . /etc/os-release

          sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null <<EOF
          Types: deb
          URIs: https://apt.postgresql.org/pub/repos/apt
          Suites: ${VERSION_CODENAME}-pgdg
          Architectures: $(dpkg --print-architecture)
          Components: main
          Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          EOF

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/pg_restore --version

      - name: Calculate Dates
        id: vars
        run: |
          set -euo pipefail
          echo "CURRENT_MONTH=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"
          echo "CURRENT_DAY=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Validate Secrets
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DB_URL:-}" ]; then
            echo "::error::Falta el secret SUPABASE_DB_URL."
            exit 1
          fi

          case "$DB_URL" in
            postgres://*|postgresql://*) ;;
            *)
              echo "::error::SUPABASE_DB_URL no parece una URL PostgreSQL válida."
              exit 1
              ;;
          esac

          if [ -z "${BACKUP_ENCRYPTION_PASSWORD:-}" ]; then
            echo "::error::Falta el secret BACKUP_ENCRYPTION_PASSWORD."
            exit 1
          fi

          if [ "${#BACKUP_ENCRYPTION_PASSWORD}" -lt 32 ]; then
            echo "::error::BACKUP_ENCRYPTION_PASSWORD debe tener al menos 32 caracteres."
            exit 1
          fi

          echo "::add-mask::$DB_URL"
          echo "::add-mask::$BACKUP_ENCRYPTION_PASSWORD"
          echo "Secrets OK."

      - name: Setup Dynamic Monthly Branch
        run: |
          set -euo pipefail

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          BRANCH_NAME="backups-${{ steps.vars.outputs.CURRENT_MONTH }}"

          git fetch origin --prune

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout "$BRANCH_NAME"
            git pull --ff-only origin "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
            git push -u origin "$BRANCH_NAME"
          fi

      - name: Execute Encrypted Backup
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p encrypted_backups

          RAW_DUMP="database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump"
          ENCRYPTED_DUMP="encrypted_backups/database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg"

          cleanup() {
            rm -f "$RAW_DUMP"
          }
          trap cleanup EXIT

          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --format=custom \
            --blobs \
            --no-owner \
            --no-privileges \
            --verbose \
            --file "$RAW_DUMP"

          test -s "$RAW_DUMP"

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --symmetric \
            --cipher-algo AES256 \
            --passphrase "$BACKUP_ENCRYPTION_PASSWORD" \
            --output "$ENCRYPTED_DUMP" \
            "$RAW_DUMP"

          test -s "$ENCRYPTED_DUMP"

          rm -f "$RAW_DUMP"

          echo "Backup cifrado generado: $ENCRYPTED_DUMP"

      - name: Commit Encrypted Backup
        run: |
          set -euo pipefail

          git add encrypted_backups/*.gpg

          if git diff --cached --quiet; then
            echo "No encrypted backup changes detected."
          else
            git commit -m "backup: encrypted dump ${{ steps.vars.outputs.CURRENT_DAY }} [skip ci]"
            git push origin "backups-${{ steps.vars.outputs.CURRENT_MONTH }}"
          fi

      - name: Smart Clean Up Old Monthly Branches
        run: |
          set -euo pipefail

          git fetch origin --prune

          BRANCHES="$(git branch -r | grep 'origin/backups-' | sed 's/^[[:space:]]*origin\///' | sort || true)"
          COUNT="$(echo "$BRANCHES" | grep -c '^backups-' || true)"

          echo "Total de ramas de respaldo actuales: $COUNT"

          if [ "$COUNT" -ge 4 ]; then
            OLDEST_BRANCH="$(echo "$BRANCHES" | head -n 1)"
            CURRENT_BRANCH="backups-${{ steps.vars.outputs.CURRENT_MONTH }}"

            if [ "$OLDEST_BRANCH" != "$CURRENT_BRANCH" ]; then
              echo "Eliminando rama antigua expirada: $OLDEST_BRANCH"
              git push origin --delete "$OLDEST_BRANCH"
            else
              echo "La rama más antigua es la actual. No se elimina nada."
            fi
          else
            echo "Protección activa: Tienes $COUNT rama(s). No se elimina nada."
          fi