name: Supabase Encrypted Backup with Safety Net

on:
  repository_dispatch:
    types: [supabase_backup_trigger]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: supabase-backup
  cancel-in-progress: true

jobs:
  backup-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install PostgreSQL 17 Client and GPG
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg postgresql-common

          sudo install -d /usr/share/postgresql-common/pgdg

          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc

          . /etc/os-release

          sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null <<EOF
          Types: deb
          URIs: https://apt.postgresql.org/pub/repos/apt
          Suites: ${VERSION_CODENAME}-pgdg
          Architectures: $(dpkg --print-architecture)
          Components: main
          Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          EOF

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/pg_restore --version

      - name: Calculate Dates
        id: vars
        run: |
          set -euo pipefail
          echo "CURRENT_MONTH=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"
          echo "CURRENT_DAY=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Validate Secrets
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DB_URL:-}" ]; then
            echo "::error::Falta el secret SUPABASE_DB_URL."
            exit 1
          fi

          case "$DB_URL" in
            postgres://*|postgresql://*) ;;
            *)
              echo "::error::SUPABASE_DB_URL no parece una URL PostgreSQL válida."
              exit 1
              ;;
          esac

          if [ -z "${BACKUP_ENCRYPTION_PASSWORD:-}" ]; then
            echo "::error::Falta el secret BACKUP_ENCRYPTION_PASSWORD."
            exit 1
          fi

          if [ "${#BACKUP_ENCRYPTION_PASSWORD}" -lt 32 ]; then
            echo "::error::BACKUP_ENCRYPTION_PASSWORD debe tener al menos 32 caracteres."
            exit 1
          fi

          echo "::add-mask::$DB_URL"
          echo "::add-mask::$BACKUP_ENCRYPTION_PASSWORD"
          echo "Secrets OK."

      - name: Setup Dynamic Monthly Branch
        run: |
          set -euo pipefail

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          BRANCH_NAME="backups-${{ steps.vars.outputs.CURRENT_MONTH }}"

          git fetch origin --prune

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout "$BRANCH_NAME"
            git pull --ff-only origin "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
            git push -u origin "$BRANCH_NAME"
          fi

      - name: Execute Encrypted Backup
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p encrypted_backups manifests

          RAW_DUMP="database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump"
          ENCRYPTED_DUMP_TMP="database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg"
          BACKUP_PREFIX="encrypted_backups/database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg"
          SHA_FILE="encrypted_backups/database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg.sha256"
          MANIFEST_FILE="manifests/database_backup_${{ steps.vars.outputs.TIMESTAMP }}.json"

          cleanup() {
            rm -f "$RAW_DUMP"
            rm -f "$ENCRYPTED_DUMP_TMP"
          }
          trap cleanup EXIT

          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --format=custom \
            --blobs \
            --no-owner \
            --no-privileges \
            --verbose \
            --file "$RAW_DUMP"

          test -s "$RAW_DUMP"

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --symmetric \
            --cipher-algo AES256 \
            --passphrase "$BACKUP_ENCRYPTION_PASSWORD" \
            --output "$ENCRYPTED_DUMP_TMP" \
            "$RAW_DUMP"

          test -s "$ENCRYPTED_DUMP_TMP"

          sha256sum "$ENCRYPTED_DUMP_TMP" > "$SHA_FILE"

          split \
            --bytes=90M \
            --suffix-length=3 \
            --additional-suffix=.part \
            "$ENCRYPTED_DUMP_TMP" \
            "${BACKUP_PREFIX}."

          PART_COUNT="$(find encrypted_backups -maxdepth 1 -type f -name "database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg.*.part" | wc -l | tr -d ' ')"

          if [ "$PART_COUNT" -lt 1 ]; then
            echo "::error::No se generaron partes del backup cifrado."
            exit 1
          fi

          cat > "$MANIFEST_FILE" <<EOF
          {
            "backup_type": "full_logical_pg_dump_custom_encrypted_split",
            "timestamp": "${{ steps.vars.outputs.TIMESTAMP }}",
            "encrypted_original_filename": "$ENCRYPTED_DUMP_TMP",
            "parts_prefix": "$BACKUP_PREFIX",
            "part_size": "90M",
            "part_count": $PART_COUNT,
            "sha256_file": "$SHA_FILE",
            "format": "pg_dump custom",
            "encryption": "gpg symmetric AES256",
            "restore_order": "cat encrypted_backups/database_backup_${{ steps.vars.outputs.TIMESTAMP }}.dump.gpg.*.part > database_backup.dump.gpg"
          }
          EOF

          rm -f "$RAW_DUMP"
          rm -f "$ENCRYPTED_DUMP_TMP"

          echo "Backup cifrado troceado generado con $PART_COUNT parte(s)."

      - name: Commit Encrypted Backup
        run: |
          set -euo pipefail

          git add encrypted_backups manifests

          if git diff --cached --quiet; then
            echo "No encrypted backup changes detected."
          else
            git commit -m "backup: encrypted split dump ${{ steps.vars.outputs.CURRENT_DAY }} [skip ci]"
            git push origin "backups-${{ steps.vars.outputs.CURRENT_MONTH }}"
          fi


      - name: Smart Clean Up Old Backups
        run: |
          set -euo pipefail

          KEEP_BACKUPS=30
          MIN_SAFETY_BACKUPS=7

          mkdir -p encrypted_backups manifests

          mapfile -t MANIFESTS < <(find manifests -maxdepth 1 -type f -name 'database_backup_*.json' | sort)
          COUNT="${#MANIFESTS[@]}"

          echo "Backups completos registrados por manifest: $COUNT"

          if [ "$COUNT" -le "$KEEP_BACKUPS" ]; then
            echo "Hay $COUNT backup(s). No supera $KEEP_BACKUPS. No se borra nada."
            exit 0
          fi

          DELETE_COUNT=$((COUNT - KEEP_BACKUPS))
          REMAINING_AFTER_DELETE=$((COUNT - DELETE_COUNT))

          if [ "$REMAINING_AFTER_DELETE" -lt "$MIN_SAFETY_BACKUPS" ]; then
            echo "Protección activa: borrar dejaría menos de $MIN_SAFETY_BACKUPS backups."
            exit 0
          fi

          for ((i=0; i<DELETE_COUNT; i++)); do
            MANIFEST="${MANIFESTS[$i]}"
            BASE="$(basename "$MANIFEST" .json)"

            echo "Eliminando backup antiguo: $BASE"

            rm -f "$MANIFEST"
            rm -f "encrypted_backups/${BASE}.dump.gpg.sha256"
            rm -f "encrypted_backups/${BASE}.dump.gpg."*.part
          done

          git add -A encrypted_backups manifests

          if git diff --cached --quiet; then
            echo "No retention changes to commit."
          else
            git commit -m "backup: retention cleanup keep latest ${KEEP_BACKUPS} min ${MIN_SAFETY_BACKUPS} [skip ci]"
            git push origin "backups-${{ steps.vars.outputs.CURRENT_MONTH }}"
          fi

